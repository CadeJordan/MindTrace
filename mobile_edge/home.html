<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindTrace</title>
  <style>
    :root { --bg: #0f0f12; --card: #1a1a20; --accent: #6366f1; --text: #e4e4e7; --muted: #71717a; }
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text);
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: var(--card); border-radius: 12px; padding: 2rem; max-width: 420px; width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
    h1 { margin: 0 0 1.5rem; font-size: 1.5rem; font-weight: 600; }
    label { display: block; margin-bottom: 0.35rem; font-size: 0.9rem; color: var(--muted); }
    input[type="text"] { width: 100%; padding: 0.6rem 0.75rem; margin-bottom: 1rem;
      background: var(--bg); border: 1px solid #2d2d35; border-radius: 8px; color: var(--text);
      font-size: 1rem; }
    input:focus { outline: none; border-color: var(--accent); }
    button { width: 100%; padding: 0.75rem; background: var(--accent); color: white; border: none;
      border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button:hover { filter: brightness(1.1); }
    .emotion { font-size: 2rem; font-weight: 700; text-transform: capitalize; margin: 1rem 0; color: var(--accent); }
    .muted { color: var(--muted); font-size: 0.9rem; }
    .actions { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem; }
    a.button { display: block; text-align: center; padding: 0.75rem; background: var(--accent); color: white;
      text-decoration: none; border-radius: 8px; font-weight: 600; }
    a.button:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <div class="card">
    <h1>MindTrace</h1>
    {% if user_id %}
      <p class="muted">Current emotion for <strong>{{ user_id }}</strong></p>
      {% if emotion %}
        <p class="emotion" id="emotionValue">{{ emotion }}</p>
      {% else %}
        <p class="muted" id="emotionValue">No emotion data yet.</p>
      {% endif %}
      <p class="muted" id="wsStatus"></p>
      <div class="actions">
        <a href="{{ url_for('survey') }}?user={{ user_id }}" class="button">Take survey</a>
      </div>
    {% else %}
      <form method="get" action="{{ url_for('index') }}">
        <label for="user_id">User / Session ID</label>
        <input id="user_id" name="user" type="text" placeholder="e.g. user_01" required>
        <button type="submit">Load</button>
      </form>
    {% endif %}
  </div>

  {% if user_id %}
  <script>
  (() => {
    const userId = {{ user_id | tojson }};
    const emotionEl = document.getElementById('emotionValue');
    const statusEl = document.getElementById('wsStatus');
    const wsUrl = {{ edge_ws_url | tojson if edge_ws_url is defined and edge_ws_url else 'null' }};
    const fallbackWsUrl = (location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.hostname + ':8765';
    const actualWsUrl = (typeof wsUrl === 'string' && wsUrl) ? wsUrl : fallbackWsUrl;

    function setStatus(text) {
      if (statusEl) statusEl.textContent = text || '';
    }

    function connect() {
      setStatus(`Connecting to ${actualWsUrl} ...`);
      const ws = new WebSocket(actualWsUrl);

      ws.onopen = () => setStatus('Live: connected');
      ws.onclose = () => {
        setStatus('Live: disconnected (retrying...)');
        setTimeout(connect, 1000);
      };
      ws.onerror = () => setStatus('Live: error (retrying...)');
      ws.onmessage = (ev) => {
        try {
          const data = JSON.parse(ev.data);
          if (data && data.user === userId && data.emotion && emotionEl) {
            emotionEl.textContent = data.emotion;
            emotionEl.className = 'emotion';
          }
        } catch (_) {}
      };
    }

    connect();
  })();
  </script>
  {% endif %}
</body>
</html>
